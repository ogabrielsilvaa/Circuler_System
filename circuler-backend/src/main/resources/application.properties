spring.datasource.url=jdbc:mysql://localhost:3307/circuler?useTimezone=true&serverTimezone=UTC
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.application.name=circuler-api

# JWT
jwt.secret=circuler-jwt-secret-key-for-development-only-change-this-in-production-env
jwt.expiration=86400000
